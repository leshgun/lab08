name: Release Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_pack:
    name: Build and Pack
    runs-on: ${{ matrix.os }}
    
    # Добавляем права на запись контента и релизов
    permissions:
      contents: write
      
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            generator: "DEB;RPM;TGZ"
          - os: macos-latest
            generator: "DragNDrop;TGZ"

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Install RPM tools (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y rpm

    - name: Configure CMake
      run: cmake -H. -B_build -DCPACK_GENERATOR="${{ matrix.generator }}"

    - name: Build project and build packages via CPack
      run: cmake --build _build --target package

    - name: Upload Artifacts to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        fail_on_unmatched_files: false
        files: |
          _build/*.deb
          _build/*.rpm
          _build/*.dmg
          _build/*.tar.gz
          _build/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
